services:
  nginx:
    image: nginx:alpine
    restart: always
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - nextjs
      - user-service
      - torrent-service

  nextjs:
    build: ./frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    # Port 3000 is internal, exposed via Nginx
    # ports:
    #   - "3000:3000" 

  user-service:
    build: ./user-service
    volumes:
      - ./user-service:/app
    # Port 8000 exposed for Nginx
    # ports:
    #   - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  torrent-service:
    build: ./torrent-service
    volumes:
      - ./torrent-service:/app
    # Port 8001
    # ports:
    #   - "8001:8001"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload

  db:
    image: postgres:16
    env_file:
      - .env
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hypertube"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
