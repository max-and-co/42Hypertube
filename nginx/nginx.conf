events {}

http {
    server {
        listen 80;

        # User Service Routes
        location /api/auth/ { proxy_pass http://user-service:8000; }
        location /api/users/ { proxy_pass http://user-service:8000; }
        location /api/movies/ { proxy_pass http://user-service:8000; }
        location /api/comments/ { proxy_pass http://user-service:8000; }
        location /api/oauth/ { proxy_pass http://user-service:8000; }

        # Torrent Service Routes
        location /api/torrent/ { proxy_pass http://torrent-service:8001; }
        location /api/stream/ { proxy_pass http://torrent-service:8001; }
        location /api/subtitles/ { proxy_pass http://torrent-service:8001; }

        # Frontend (Next.js) - Default Catch-all
        location / {
            proxy_pass http://nextjs:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
