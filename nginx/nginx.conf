events {}

http {
    server {
        listen 80;

        # ── User Service ─────────────────────────────────────────────────────

        # Auth routes: /api/auth/login → POST /login at user-service
        location /api/auth/ {
            rewrite /api/auth/(.*) /$1 break;
            proxy_pass http://user-service:8000;
        }

        # OAuth browser + token routes: /api/oauth/token → POST /token
        location /api/oauth/ {
            rewrite /api/oauth/(.*) /$1 break;
            proxy_pass http://user-service:8000;
        }

        # User routes (with and without trailing slash):
        #   /api/users      → GET /   (user listing)
        #   /api/users/     → GET /   (user listing)
        #   /api/users/123  → GET /123
        #   /api/users/me   → GET /me
        location /api/users {
            rewrite /api/users/?(.*) /$1 break;
            proxy_pass http://user-service:8000;
        }

        # Movie routes: /api/movies/123 → GET /movies/123 at user-service
        location /api/movies {
            rewrite /api/movies/?(.*) /movies/$1 break;
            proxy_pass http://user-service:8000;
        }

        # Comment routes: /api/comments/123 → GET /comments/123 at user-service
        location /api/comments {
            rewrite /api/comments/?(.*) /comments/$1 break;
            proxy_pass http://user-service:8000;
        }

        # ── Torrent Service ──────────────────────────────────────────────────

        location /api/torrent/ {
            rewrite /api/torrent/(.*) /$1 break;
            proxy_pass http://torrent-service:8001;
        }
        location /api/stream/ {
            rewrite /api/stream/(.*) /$1 break;
            proxy_pass http://torrent-service:8001;
        }
        location /api/subtitles/ {
            rewrite /api/subtitles/(.*) /$1 break;
            proxy_pass http://torrent-service:8001;
        }

        # ── Frontend (Next.js) ───────────────────────────────────────────────

        location / {
            proxy_pass http://nextjs:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
