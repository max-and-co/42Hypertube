events {}

http {
    server {
        listen 80;

        # User Service Routes
        location /api/auth/ {
            rewrite /api/auth/(.*) /$1 break;
            proxy_pass http://user-service:8000;
        }
        location /api/users/ {
            rewrite /api/users/(.*) /$1 break;
            proxy_pass http://user-service:8000;
        }
        location /api/movies/ {
            rewrite /api/movies/(.*) /$1 break;
            proxy_pass http://user-service:8000;
        }
        location /api/comments/ {
            rewrite /api/comments/(.*) /$1 break;
            proxy_pass http://user-service:8000;
        }
        location /api/oauth/ {
            rewrite /api/oauth/(.*) /$1 break;
            proxy_pass http://user-service:8000;
        }

        # Torrent Service Routes
        location /api/torrent/ {
            rewrite /api/torrent/(.*) /$1 break;
            proxy_pass http://torrent-service:8001;
        }
        location /api/stream/ {
            rewrite /api/stream/(.*) /$1 break;
            proxy_pass http://torrent-service:8001;
        }
        location /api/subtitles/ {
            rewrite /api/subtitles/(.*) /$1 break;
            proxy_pass http://torrent-service:8001;
        }

        # Frontend (Next.js) - Default Catch-all
        location / {
            proxy_pass http://nextjs:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
